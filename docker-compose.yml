version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "4000:4000"
    env_file: 
      - .env
      - services/api-gateway/.env
    networks:
      - ai-memory-network

  memory-service:
    build:
      context: .
      dockerfile: services/memory-service/Dockerfile
    env_file: 
      - .env
      - services/memory-service/.env
    depends_on:
      - classifier
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-memory-network

  classifier:
    build:
      context: .
      dockerfile: services/classifier/Dockerfile
    environment:
      - PORT=5001
    networks:
      - ai-memory-network

  storage-service:
    build:
      context: .
      dockerfile: services/storage-service/Dockerfile
    env_file: 
      - .env
      - services/storage-service/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-memory-network

  embedding-service:
    build:
      context: .
      dockerfile: services/embedding-service/Dockerfile
    env_file: 
      - .env
      - services/embedding-service/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-memory-network

  retrieval-service:
    build:
      context: .
      dockerfile: services/memory-retrieval-service/Dockerfile
    env_file: 
      - .env
      - services/memory-retrieval-service/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-memory-network

  deletion-service:
    build:
      context: .
      dockerfile: services/memory-deletion-service/Dockerfile
    env_file: 
      - .env
      - services/memory-deletion-service/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-memory-network

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    env_file: 
      - .env
      - services/user-service/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-memory-network

  scoring-service:
    build:
      context: .
      dockerfile: services/scoring-service/Dockerfile
    env_file: 
      - .env
      - services/scoring-service/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-memory-network
  
  rag-service: 
    build:
      context: .
      dockerfile: services/RAG-service/Dockerfile
    env_file: 
      - .env
      - services/RAG-service/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: 
      - ai-memory-network

networks:
  ai-memory-network:
    driver: bridge