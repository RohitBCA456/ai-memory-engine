version: "3.8"

services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    image: api-gateway-service:latest
    ports:
      - "4000:4000"
    env_file:
      - .env
      - services/api-gateway/.env
    networks:
      - ai-memory-network

  memory-service:
    build:
      context: .
      dockerfile: services/memory-service/Dockerfile
    image: memory-service:latest
    env_file:
      - .env
      - services/memory-service/.env
    depends_on:
      - classifier
    networks:
      - ai-memory-network

  classifier:
    build:
      context: .
      dockerfile: services/classifier/Dockerfile
    image: classifier-service:latest
    environment:
      - PORT=5001
    networks:
      - ai-memory-network

  storage-service:
    build:
      context: .
      dockerfile: services/storage-service/Dockerfile
    image: storage-service:latest
    env_file:
      - .env
      - services/storage-service/.env
    networks:
      - ai-memory-network

  embedding-service:
    build:
      context: .
      dockerfile: services/embedding-service/Dockerfile
    image: embedding-service:latest
    env_file:
      - .env
      - services/embedding-service/.env
    networks:
      - ai-memory-network

  retrieval-service:
    build:
      context: .
      dockerfile: services/memory-retrieval-service/Dockerfile
    image: memory-retrieval-service:latest
    env_file:
      - .env
      - services/memory-retrieval-service/.env
    networks:
      - ai-memory-network

  deletion-service:
    build:
      context: .
      dockerfile: services/memory-deletion-service/Dockerfile
    image: memory-deletion-service:latest
    env_file:
      - .env
      - services/memory-deletion-service/.env
    networks:
      - ai-memory-network

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    image: user-service:latest
    env_file:
      - .env
      - services/user-service/.env
    networks:
      - ai-memory-network

  scoring-service:
    build:
      context: .
      dockerfile: services/scoring-service/Dockerfile
    image: scoring-service:latest
    env_file:
      - .env
      - services/scoring-service/.env
    networks:
      - ai-memory-network

  rag-service:
    build:
      context: .
      dockerfile: services/RAG-service/Dockerfile
    image: RAG-service:latest
    env_file:
      - .env
      - services/RAG-service/.env
    networks:
      - ai-memory-network

  redis:
    image: redis
    ports:
      - "6379:6379"
    networks:
      - ai-memory-network

networks:
  ai-memory-network:
    driver: bridge
